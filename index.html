<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Memorabilia Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; padding-bottom: 80px;
  }
  header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 16px 20px; position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid #333;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header .stats {
    display: flex; gap: 16px; margin-top: 6px; font-size: 13px; color: #8899aa;
  }
  header .stats span { color: #4fc3f7; font-weight: 600; }

  /* Tabs */
  .tabs {
    display: flex; background: #111; border-bottom: 1px solid #333;
    position: sticky; top: 68px; z-index: 99;
  }
  .tab {
    flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600;
    color: #666; border-bottom: 2px solid transparent; cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { color: #4fc3f7; border-bottom-color: #4fc3f7; }

  /* Panels */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* Add Item Form */
  .photo-capture {
    width: 100%; aspect-ratio: 4/3; background: #1a1a1a; border: 2px dashed #333;
    border-radius: 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    overflow: hidden; position: relative; margin-bottom: 16px;
  }
  .photo-capture img {
    width: 100%; height: 100%; object-fit: cover; position: absolute;
  }
  .photo-capture .placeholder { text-align: center; color: #555; z-index: 1; }
  .photo-capture .placeholder svg { width: 48px; height: 48px; fill: #444; margin-bottom: 8px; }
  .photo-capture .placeholder p { font-size: 14px; }
  .photo-capture.has-photo .placeholder { display: none; }

  input[type="file"] { display: none; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: #4fc3f7;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .tag {
    padding: 8px 14px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .tag.selected { background: #1a3a4a; border-color: #4fc3f7; color: #4fc3f7; }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary { background: #4fc3f7; color: #000; }
  .btn-primary:active { background: #03a9f4; transform: scale(0.98); }
  .btn-secondary { background: #1a1a2e; color: #4fc3f7; border: 1px solid #4fc3f7; }
  .btn-danger { background: #2a1a1a; color: #f44; border: 1px solid #f44; }
  .btn-success { background: #1a2a1a; color: #4caf50; border: 1px solid #4caf50; }

  /* Item Cards */
  .item-card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    margin-bottom: 12px; overflow: hidden;
  }
  .item-card-header {
    display: flex; align-items: center; padding: 12px; gap: 12px;
  }
  .item-card-thumb {
    width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
    background: #1a1a1a; flex-shrink: 0;
  }
  .item-card-info { flex: 1; min-width: 0; }
  .item-card-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card-info .item-category { font-size: 12px; color: #4fc3f7; }
  .item-card-info .item-desc { font-size: 12px; color: #777; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card-actions {
    display: flex; gap: 8px; padding: 0 12px 12px;
  }
  .item-card-actions button {
    flex: 1; padding: 8px; border: 1px solid #333; background: #1a1a1a;
    color: #aaa; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .item-card-actions button:active { background: #222; }
  .item-card-actions .ebay-btn { border-color: #e53935; color: #e53935; }
  .item-card-actions .google-btn { border-color: #4caf50; color: #4caf50; }
  .item-card-actions .delete-btn { border-color: #666; color: #666; }

  .item-value {
    padding: 4px 10px; background: #1a2a1a; color: #4caf50;
    border-radius: 6px; font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  .item-value.no-value { background: #1a1a1a; color: #555; }

  /* Export panel */
  .export-section { margin-bottom: 20px; }
  .export-section h3 { font-size: 16px; margin-bottom: 10px; }
  .export-preview {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 12px; font-size: 12px; font-family: monospace; color: #888;
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  /* Search bar */
  .search-bar {
    padding: 10px; background: #111; position: sticky; top: 110px; z-index: 98;
  }
  .search-bar input {
    width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none;
  }
  .search-bar input:focus { border-color: #4fc3f7; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: #444;
  }
  .empty-state svg { width: 64px; height: 64px; fill: #333; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  /* Value input inline */
  .value-input-row {
    display: flex; gap: 8px; padding: 0 12px 12px;
  }
  .value-input-row input {
    flex: 1; padding: 8px 12px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 6px; color: #4caf50; font-size: 14px; outline: none;
  }
  .value-input-row button {
    padding: 8px 16px; background: #1a2a1a; border: 1px solid #4caf50;
    color: #4caf50; border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }

  /* Quick add bottom bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #111; border-top: 1px solid #333;
    padding: 12px 16px; z-index: 100;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .bottom-bar .btn { margin-top: 0; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: #4caf50; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; z-index: 200; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Condition tags */
  .condition-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .condition-tag {
    padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid; user-select: none;
  }
  .condition-tag[data-val="mint"] { border-color: #4caf50; color: #4caf50; background: transparent; }
  .condition-tag[data-val="mint"].selected { background: #1a2a1a; }
  .condition-tag[data-val="excellent"] { border-color: #2196f3; color: #2196f3; background: transparent; }
  .condition-tag[data-val="excellent"].selected { background: #1a1a2e; }
  .condition-tag[data-val="good"] { border-color: #ff9800; color: #ff9800; background: transparent; }
  .condition-tag[data-val="good"].selected { background: #2a2a1a; }
  .condition-tag[data-val="fair"] { border-color: #f44336; color: #f44336; background: transparent; }
  .condition-tag[data-val="fair"].selected { background: #2a1a1a; }
</style>
</head>
<body>

<header>
  <h1>Memorabilia Scanner</h1>
  <div class="stats">
    <div>Items: <span id="totalItems">0</span></div>
    <div>Valued: <span id="totalValued">0</span></div>
    <div>Est. Total: <span id="totalValue">$0</span></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="add" onclick="switchTab('add')">+ Add</div>
  <div class="tab" data-tab="items" onclick="switchTab('items')">Items</div>
  <div class="tab" data-tab="export" onclick="switchTab('export')">Export</div>
</div>

<!-- ADD PANEL -->
<div class="panel active" id="panel-add">
  <div class="photo-capture" id="photoCapture" onclick="document.getElementById('cameraInput').click()">
    <div class="placeholder">
      <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 100-6.4 3.2 3.2 0 000 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
      <p>Tap to take photo</p>
    </div>
    <img id="photoPreview" style="display:none">
  </div>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">

  <div class="form-group">
    <label>Item Name / Title</label>
    <input type="text" id="itemName" placeholder="e.g. Miami Dolphins Dan Marino Jersey">
  </div>

  <div class="form-group">
    <label>Category</label>
    <div class="tags" id="categoryTags">
      <div class="tag" data-cat="Jersey" onclick="selectTag(this,'categoryTags')">Jersey</div>
      <div class="tag" data-cat="Hat" onclick="selectTag(this,'categoryTags')">Hat</div>
      <div class="tag" data-cat="T-Shirt" onclick="selectTag(this,'categoryTags')">T-Shirt</div>
      <div class="tag" data-cat="Jacket" onclick="selectTag(this,'categoryTags')">Jacket</div>
      <div class="tag" data-cat="Signed Item" onclick="selectTag(this,'categoryTags')">Signed</div>
      <div class="tag" data-cat="Card" onclick="selectTag(this,'categoryTags')">Card</div>
      <div class="tag" data-cat="Ball" onclick="selectTag(this,'categoryTags')">Ball</div>
      <div class="tag" data-cat="Photo/Print" onclick="selectTag(this,'categoryTags')">Photo</div>
      <div class="tag" data-cat="Pennant" onclick="selectTag(this,'categoryTags')">Pennant</div>
      <div class="tag" data-cat="Shoes" onclick="selectTag(this,'categoryTags')">Shoes</div>
      <div class="tag" data-cat="Other" onclick="selectTag(this,'categoryTags')">Other</div>
    </div>
  </div>

  <div class="form-group">
    <label>Condition</label>
    <div class="condition-tags" id="conditionTags">
      <div class="condition-tag" data-val="mint" onclick="selectCondition(this)">Mint</div>
      <div class="condition-tag" data-val="excellent" onclick="selectCondition(this)">Excellent</div>
      <div class="condition-tag" data-val="good" onclick="selectCondition(this)">Good</div>
      <div class="condition-tag" data-val="fair" onclick="selectCondition(this)">Fair</div>
    </div>
  </div>

  <div class="form-group">
    <label>Sport / Team / Player</label>
    <input type="text" id="itemTeam" placeholder="e.g. NFL / Dolphins / Marino">
  </div>

  <div class="form-group">
    <label>Notes</label>
    <textarea id="itemNotes" placeholder="Size, year, tags still on, damage, etc." rows="2"></textarea>
  </div>

  <div class="form-group">
    <label>Estimated Value ($)</label>
    <input type="number" id="itemValue" placeholder="Leave blank if unknown" inputmode="decimal">
  </div>

  <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
  <button class="btn btn-secondary" onclick="clearForm()" style="margin-top:8px">Clear Form</button>
</div>

<!-- ITEMS PANEL -->
<div class="panel" id="panel-items">
  <div class="search-bar" style="padding:0; margin-bottom:12px; position:static;">
    <input type="text" id="searchInput" placeholder="Search items..." oninput="renderItems()">
  </div>
  <div id="itemsList"></div>
</div>

<!-- EXPORT PANEL -->
<div class="panel" id="panel-export">
  <div class="export-section">
    <h3>Summary</h3>
    <div id="exportSummary" style="background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:14px; margin-bottom:16px; font-size:14px; line-height:1.6;"></div>
  </div>

  <button class="btn btn-primary" onclick="exportCSV()">Download CSV</button>
  <button class="btn btn-secondary" onclick="copyList()" style="margin-top:8px">Copy List to Clipboard</button>
  <button class="btn btn-success" onclick="shareList()" style="margin-top:8px">Share List</button>

  <div class="export-section" style="margin-top:20px">
    <h3>CSV Preview</h3>
    <div class="export-preview" id="csvPreview"></div>
  </div>

  <button class="btn btn-danger" onclick="clearAll()" style="margin-top:20px">Clear All Items</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'memorabilia_items';

function getItems() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); }
  catch { return []; }
}
function saveItems(items) {
  localStorage.setItem(DB_KEY, JSON.stringify(items));
  updateStats();
}

function updateStats() {
  const items = getItems();
  const valued = items.filter(i => i.value > 0);
  const total = valued.reduce((s, i) => s + parseFloat(i.value), 0);
  document.getElementById('totalItems').textContent = items.length;
  document.getElementById('totalValued').textContent = valued.length;
  document.getElementById('totalValue').textContent = '$' + total.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

// Tabs
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'items') renderItems();
  if (tab === 'export') renderExport();
}

// Photo
let currentPhoto = null;
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    // Resize to save localStorage space
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      currentPhoto = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('photoCapture').classList.add('has-photo');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Tags
function selectTag(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
}
function selectCondition(el) {
  document.querySelectorAll('#conditionTags .condition-tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
}

// Save
function saveItem() {
  const name = document.getElementById('itemName').value.trim();
  if (!name) { showToast('Enter an item name'); return; }

  const catEl = document.querySelector('#categoryTags .tag.selected');
  const condEl = document.querySelector('#conditionTags .condition-tag.selected');

  const item = {
    id: Date.now(),
    name: name,
    category: catEl ? catEl.dataset.cat : '',
    condition: condEl ? condEl.dataset.val : '',
    team: document.getElementById('itemTeam').value.trim(),
    notes: document.getElementById('itemNotes').value.trim(),
    value: parseFloat(document.getElementById('itemValue').value) || 0,
    photo: currentPhoto || '',
    created: new Date().toISOString()
  };

  const items = getItems();
  items.unshift(item);
  saveItems(items);
  clearForm();
  showToast('Item saved!');
}

function clearForm() {
  document.getElementById('itemName').value = '';
  document.getElementById('itemTeam').value = '';
  document.getElementById('itemNotes').value = '';
  document.getElementById('itemValue').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoCapture').classList.remove('has-photo');
  document.getElementById('cameraInput').value = '';
  currentPhoto = null;
  document.querySelectorAll('.tag.selected, .condition-tag.selected').forEach(t => t.classList.remove('selected'));
  document.getElementById('itemName').focus();
}

// Render items
function renderItems() {
  const items = getItems();
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = search ? items.filter(i =>
    i.name.toLowerCase().includes(search) ||
    i.category.toLowerCase().includes(search) ||
    i.team.toLowerCase().includes(search) ||
    i.notes.toLowerCase().includes(search)
  ) : items;

  const container = document.getElementById('itemsList');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4z"/></svg>
      <p>${search ? 'No items match your search' : 'No items yet. Start adding!'}</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(item => `
    <div class="item-card" data-id="${item.id}">
      <div class="item-card-header">
        ${item.photo
          ? `<img class="item-card-thumb" src="${item.photo}" alt="">`
          : `<div class="item-card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px">${getCategoryEmoji(item.category)}</div>`
        }
        <div class="item-card-info">
          <h3>${esc(item.name)}</h3>
          <div class="item-category">${esc(item.category)}${item.condition ? ' &middot; ' + capitalize(item.condition) : ''}</div>
          ${item.team ? `<div class="item-desc">${esc(item.team)}</div>` : ''}
        </div>
        <div class="${item.value > 0 ? 'item-value' : 'item-value no-value'}">
          ${item.value > 0 ? '$' + item.value.toLocaleString() : '?'}
        </div>
      </div>
      ${item.notes ? `<div style="padding:0 12px 8px; font-size:12px; color:#666">${esc(item.notes)}</div>` : ''}
      <div class="value-input-row">
        <input type="number" inputmode="decimal" placeholder="Set value $" id="val-${item.id}" value="${item.value || ''}" />
        <button onclick="updateValue(${item.id})">Set $</button>
      </div>
      <div class="item-card-actions">
        <button class="ebay-btn" onclick="searchEbay('${escAttr(item.name)}')">eBay Sold</button>
        <button class="google-btn" onclick="searchGoogle('${escAttr(item.name)}')">Google</button>
        <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

function getCategoryEmoji(cat) {
  const map = { 'Jersey': '👕', 'Hat': '🧢', 'T-Shirt': '👕', 'Jacket': '🧥', 'Signed Item': '✍️', 'Card': '🃏', 'Ball': '⚾', 'Photo/Print': '🖼️', 'Pennant': '🚩', 'Shoes': '👟', 'Other': '📦' };
  return map[cat] || '📦';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// Actions
function searchEbay(query) {
  window.open('https://www.ebay.com/sch/i.html?_nkw=' + encodeURIComponent(query) + '&LH_Complete=1&LH_Sold=1&_sop=13', '_blank');
}
function searchGoogle(query) {
  window.open('https://www.google.com/search?q=' + encodeURIComponent(query + ' value price'), '_blank');
}

function updateValue(id) {
  const input = document.getElementById('val-' + id);
  const val = parseFloat(input.value) || 0;
  const items = getItems();
  const idx = items.findIndex(i => i.id === id);
  if (idx >= 0) { items[idx].value = val; saveItems(items); renderItems(); showToast('Value updated'); }
}

function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  const items = getItems().filter(i => i.id !== id);
  saveItems(items);
  renderItems();
  showToast('Item deleted');
}

// Export
function renderExport() {
  const items = getItems();
  const valued = items.filter(i => i.value > 0);
  const total = valued.reduce((s, i) => s + i.value, 0);
  const cats = {};
  items.forEach(i => { cats[i.category || 'Uncategorized'] = (cats[i.category || 'Uncategorized'] || 0) + 1; });

  document.getElementById('exportSummary').innerHTML = `
    <div>Total items: <strong>${items.length}</strong></div>
    <div>Items valued: <strong>${valued.length}</strong></div>
    <div>Estimated total: <strong style="color:#4caf50">$${total.toLocaleString()}</strong></div>
    <div style="margin-top:8px; border-top:1px solid #333; padding-top:8px">
      ${Object.entries(cats).map(([k,v]) => `${k}: ${v}`).join('<br>')}
    </div>
  `;

  const csv = generateCSV(items);
  document.getElementById('csvPreview').textContent = csv;
}

function generateCSV(items) {
  const headers = ['Name','Category','Condition','Sport/Team/Player','Notes','Value','Date Added'];
  const rows = items.map(i => [
    `"${i.name.replace(/"/g,'""')}"`,
    i.category,
    i.condition,
    `"${(i.team||'').replace(/"/g,'""')}"`,
    `"${(i.notes||'').replace(/"/g,'""')}"`,
    i.value || '',
    new Date(i.created).toLocaleDateString()
  ].join(','));
  return [headers.join(','), ...rows].join('\n');
}

function exportCSV() {
  const items = getItems();
  if (!items.length) { showToast('No items to export'); return; }
  const csv = generateCSV(items);
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'memorabilia_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('CSV downloaded');
}

function copyList() {
  const items = getItems();
  if (!items.length) { showToast('No items'); return; }
  const text = items.map((i,n) =>
    `${n+1}. ${i.name}${i.category ? ' ['+i.category+']' : ''}${i.condition ? ' ('+i.condition+')' : ''}${i.value ? ' - $'+i.value : ''}${i.team ? ' | '+i.team : ''}${i.notes ? ' | '+i.notes : ''}`
  ).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Copied!');
  });
}

function shareList() {
  const items = getItems();
  if (!items.length) { showToast('No items'); return; }
  const text = 'Memorabilia Inventory\n' + new Date().toLocaleDateString() + '\n\n' +
    items.map((i,n) =>
      `${n+1}. ${i.name}${i.category ? ' ['+i.category+']' : ''}${i.value ? ' - $'+i.value : ''}`
    ).join('\n') +
    '\n\nTotal: $' + items.filter(i=>i.value>0).reduce((s,i)=>s+i.value,0).toLocaleString();

  if (navigator.share) {
    navigator.share({ title: 'Memorabilia Inventory', text: text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  }
}

function clearAll() {
  if (!confirm('Delete ALL items? This cannot be undone.')) return;
  if (!confirm('Are you really sure?')) return;
  localStorage.removeItem(DB_KEY);
  updateStats();
  renderItems();
  showToast('All items cleared');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
updateStats();
</script>
</body>
</html>
